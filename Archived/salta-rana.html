<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Salta‑Rana – Divertoons</title>
  <style>
    :root{
      --c-bg:#7de2ff;
      --c-frog:#2ecc71;
      --c-ob:#ff914d;
      --c-ground:#0077be;
      --c-text:#ffffff;
      --radius:12px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--c-bg);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:"Quicksand",sans-serif;touch-action:manipulation}
    canvas{background:var(--c-ground);border-radius:var(--radius);box-shadow:0 6px 14px rgba(0,0,0,.25)}
    #ui{position:fixed;top:10px;left:50%;transform:translateX(-50%);color:var(--c-text);font-weight:700;font-size:1.1rem;text-shadow:1px 1px 3px #000;z-index:10}
    #reward{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.8);color:var(--c-text);font-size:2rem;text-align:center;padding:1rem}
    #reward button{margin-top:1.2rem;font-size:1rem;padding:.7rem 1.4rem;border:none;border-radius:var(--radius);background:var(--c-ob);color:#000;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <div id="ui">Nivel 1</div>
  <canvas id="game" width="800" height="400"></canvas>
  <div id="reward">
    <p>🎉 ¡GANASTE! 🎉<br>Premio: ¡Frog Master!</p>
    <button onclick="location.reload()">Jugar de nuevo</button>
  </div>

<script>
(()=>{
  const cvs=document.getElementById('game');
  const ctx=cvs.getContext('2d');
  const ui=document.getElementById('ui');
  const reward=document.getElementById('reward');
  const W=cvs.width,H=cvs.height;

  // Juego
  let level=1,obstacles=[],frames=0,passed=0,needed=5;
  const gravity=0.6;

  const frog={x:80,y:H-60,w:40,h:40,vy:0,onGround:true};

  function resetLevel(){
    obstacles=[];frames=0;passed=0;needed=level*5;frog.y=H-60;frog.vy=0;frog.onGround=true;
  }

  function nextLevel(){
    level++;
    if(level>10){endGame();return;}
    ui.textContent='Nivel '+level;
    resetLevel();
  }

  function endGame(){
    cvs.style.filter='blur(4px)';
    reward.style.display='flex';
  }

  function addObstacle(){
    const height=40+Math.random()*30;
    obstacles.push({x:W,y:H-height,w:40,h:height});
  }

  function update(){
    frames++;
    // añadir obstáculo
    if(frames%Math.max(60-4*level,20)===0){addObstacle();}

    // física rana
    frog.vy+=gravity;
    frog.y+=frog.vy;
    if(frog.y>H-60){frog.y=H-60;frog.vy=0;frog.onGround=true;}

    // mover obstacles
    const speed=4+level*0.8;
    obstacles.forEach(ob=>ob.x-=speed);

    // colisión y fuera de pantalla
    obstacles=obstacles.filter(ob=>{
      // colisión
      if(ob.x<frog.x+frog.w && ob.x+ob.w>frog.x && ob.y<frog.y+frog.h && ob.y+ob.h>frog.y){
        // reinicia nivel
        resetLevel();
        return false;
      }
      // puntuación
      if(!ob.passed && ob.x+ob.w<frog.x){ob.passed=true;passed++;if(passed>=needed)nextLevel();}
      return ob.x+ob.w>0;
    });
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // ground strip (opcional visually)
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.fillRect(0,H-50,W,2);
    // frog
    ctx.fillStyle='var(--c-frog)';
    ctx.fillRect(frog.x,frog.y,frog.w,frog.h);
    // obstacles
    ctx.fillStyle='var(--c-ob)';
    obstacles.forEach(ob=>ctx.fillRect(ob.x,ob.y,ob.w,ob.h));
  }

  function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // Controles
  function jump(){
    if(frog.onGround){frog.vy=-12;frog.onGround=false;}
  }
  document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp')jump();});
  document.addEventListener('touchstart',jump);

  // inicial
  ui.textContent='Nivel '+level;
  loop();
})();
</script>
</body>
</html>
