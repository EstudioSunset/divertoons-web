<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Divertoons Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
  :root{
    --c-primary:#0077be;
    --c-light:#7de2ff;
    --c-highlight:#ffdc5b;
    --c-card:#fff;
    --radius:18px;
    --shadow:0 4px 10px rgba(0,0,0,.15);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;text-size-adjust:100%;}
  body{font-family:'Quicksand',sans-serif;background:var(--c-light);color:var(--c-primary);}
  img{display:block;max-width:100%;}
  a{color:inherit;text-decoration:none;}

  /* ---------- NAV ---------- */
  nav{
    position:sticky;top:0;z-index:1000;
    background:linear-gradient(90deg,var(--c-highlight),#ff914d);
    display:flex;align-items:center;justify-content:space-between;
    padding:.8rem 1rem;font-family:'Fredoka One',cursive;box-shadow:var(--shadow);
  }
  .burger{font-size:1.8rem;background:none;border:none;color:var(--c-primary);cursor:pointer;}
  .brand{font-size:1.6rem;}
  .links{display:none;flex-direction:column;gap:.75rem;margin-top:.5rem;}
  .links a{background:#005f9e;color:#fff;font-weight:600;padding:.6rem 1rem;border-radius:50px;box-shadow:0 2px 5px rgba(0,0,0,.2);}
  .links.show{display:flex;}

  /* ---------- LAUNCHER GRID ---------- */
  .grid{display:grid;gap:1rem;padding:1.5rem;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));max-width:1000px;margin:auto;}
  .card{
    background:var(--c-card);border-radius:var(--radius);text-align:center;padding:1rem;
    box-shadow:var(--shadow);cursor:pointer;animation:bounce 3s infinite ease-in-out;
  }
  .card img{width:128px;height:128px;border-radius:15px;margin:auto;}
  .card h3{font-family:'Fredoka One',cursive;margin-top:.6rem;font-size:1.1rem;}

  @keyframes bounce{
    0%,20%,50%,80%,100%{transform:translateY(0);}
    40%{transform:translateY(-6px);}
    60%{transform:translateY(-3px);}
  }

  /* ---------- ORIENTATION NOTICE ---------- */
  #rotateMsg{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
    color:#fff;justify-content:center;align-items:center;flex-direction:column;font-size:1.2rem;
    text-align:center;z-index:2000;padding:1.5rem;
  }
  #rotateMsg.show{display:flex;}
  #rotateMsg img{width:80px;margin-bottom:1rem;}

  /* ---------- FULLSCREEN CANVAS ---------- */
  #gameWrapper{display:none;position:fixed;inset:0;background:#000;z-index:1500;}
  canvas{touch-action:none;width:100%;height:100%;display:block;}
  #exitBtn{
    position:absolute;top:12px;right:12px;z-index:1600;font-size:1.4rem;background:var(--c-highlight);
    border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow);cursor:pointer;
  }

  /* ---------- MEDIA ---------- */
  @media(min-width:600px){ /* Mostrar nav links en tablets+ */
    .links{display:flex;flex-direction:row;margin:0;}
    .burger{display:none;}
  }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <span class="brand">Divertoons</span>
    <button class="burger" id="burgerBtn" aria-label="Abrir menú">&#9776;</button>
    <div class="links" id="navLinks">
      <a href="#launcher">Juegos</a>
      <a href="#contacto">Contacto</a>
    </div>
  </nav>

  <!-- GAME MENU / LAUNCHER -->
  <main id="launcher">
    <div class="grid">
      <div class="card" onclick="launchGame('juego.html')">
        <img src="https://via.placeholder.com/128/ffd93b/000000?text=1" alt="Juego 1">
        <h3>Salta-Rana</h3>
      </div>
      <div class="card" onclick="launchGame('juego.html')">
        <img src="https://via.placeholder.com/128/ffd93b/000000?text=2" alt="Juego 2">
        <h3>Astro-Nave</h3>
      </div>
      <div class="card" onclick="launchGame('juego.html')">
        <img src="https://via.placeholder.com/128/ffd93b/000000?text=3" alt="Juego 3">
        <h3>Puzzle-Pop</h3>
      </div>
      <!-- Añade más juegos aquí -->
    </div>
  </main>

  <!-- GAME CANVAS WRAPPER -->
  <div id="gameWrapper">
    <button id="exitBtn" aria-label="Salir">✕</button>
    <!-- Aquí va tu engine: reemplázalo -->
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- ROTATE NOTICE -->
  <div id="rotateMsg">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828859.png" alt="">
    <p>Gira tu dispositivo para jugar mejor</p>
  </div>

  <!-- CONTACTO -->
  <section id="contacto" style="padding:2rem;max-width:600px;margin:auto">
    <h2 style="font-family:'Fredoka One',cursive;text-align:center;margin-bottom:1rem">Contáctanos</h2>
    <form style="display:flex;flex-direction:column;gap:.8rem">
      <input required placeholder="Nombre" style="padding:.7rem;border-radius:10px;border:1px solid #ccc">
      <input required type="email" placeholder="Email" style="padding:.7rem;border-radius:10px;border:1px solid #ccc">
      <textarea required placeholder="Mensaje" style="min-height:90px;padding:.7rem;border-radius:10px;border:1px solid #ccc"></textarea>
      <button style="background:var(--c-highlight);border:none;padding:.8rem;border-radius:50px;font-weight:700">Enviar</button>
    </form>
  </section>

  <!-- FOOTER -->
  <footer style="text-align:center;padding:1rem;background:var(--c-primary);color:#fff;margin-top:1.5rem">
    © 2025 Divertoons – Todos los derechos reservados.
  </footer>

  <!-- SCRIPTS -->
  <script>
    /* NAV toggle */
    document.getElementById('burgerBtn').addEventListener('click',()=>document.getElementById('navLinks').classList.toggle('show'));

    /* Launch game -> abre juego.html dentro de #gameWrapper */
    const wrapper=document.getElementById('gameWrapper');
    function launchGame(url){
      wrapper.style.display='block';
      const iframe=document.createElement('iframe'); // fallback si prefieres iframe
      /* Si usarás canvas puro, quita el iframe y carga tu engine directamente */
      iframe.src=url;iframe.style='width:100%;height:100%;border:none';
      wrapper.appendChild(iframe);
      requestFullscreen(wrapper);
      checkOrientation();
    }

    /* Salir */
    document.getElementById('exitBtn').addEventListener('click',()=>{
      wrapper.innerHTML='<button id="exitBtn" aria-label="Salir">✕</button>';
      wrapper.style.display='none';
      if(document.fullscreenElement)document.exitFullscreen();
    });

    /* Full-screen helper */
    function requestFullscreen(el){
      const rfs=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
      if(rfs) rfs.call(el);
    }

    /* Orientation check */
    const rotateMsg=document.getElementById('rotateMsg');
    function checkOrientation(){
      const isPortrait=window.matchMedia("(orientation: portrait)").matches;
      rotateMsg.classList.toggle('show',isPortrait);
    }
    window.addEventListener('orientationchange',checkOrientation);
  </script>
</body>
</html>
